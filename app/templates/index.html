<!DOCTYPE html>
<html lang="ko">

<head>

    <meta charset="UTF-8">

    <title>
        Automation Runtime
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

</head>

<body>

<div class="container mt-5">

    <h1>
        Automation Runtime
    </h1>

    <p class="text-muted">
        업무 자동화 Runtime 플랫폼
    </p>

    <hr>

    <form
        action="/run"
        method="post"
        enctype="multipart/form-data"
    >

        <div class="mb-3">

            <label class="form-label">
                Job
            </label>

            <select
                class="form-select"
                name="job"
            >

                <option value="repair_pending">
                    Repair Pending
                </option>

            </select>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Input File
            </label>

            <input
                class="form-control"
                type="file"
                name="file"
            >

        </div>

        <button
            class="btn btn-primary"
            type="submit"
        >
            실행
        </button>

    </form>

    <hr>

    <small class="text-muted">
        Version 0.4.0
    </small>

</div>

</body>
</html>
