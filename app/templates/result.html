<!DOCTYPE html>
<html lang="ko">

<head>

    <meta charset="UTF-8">

    <title>
        Automation Runtime Result
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

</head>

<body>

<div class="container mt-5">

    <h1>
        작업 완료
    </h1>

    <hr>

    <table class="table">

        <tr>
            <th>JOB</th>
            <td>{{ result.job_name }}</td>
        </tr>

        <tr>
            <th>TOTAL ROWS</th>
            <td>{{ result.total_rows }}</td>
        </tr>

        <tr>
            <th>FILTERED</th>
            <td>{{ result.filtered_rows }}</td>
        </tr>

        <tr>
            <th>VENDORS</th>
            <td>{{ result.vendor_count }}</td>
        </tr>

        <tr>
            <th>OUTPUT FILES</th>
            <td>{{ result.output_file_count }}</td>
        </tr>

        <tr>
            <th>SUCCESS</th>
            <td>{{ result.success }}</td>
        </tr>

    </table>

    <a
        href="/download"
        class="btn btn-success"
    >
        결과 ZIP 다운로드
    </a>

    <a
        href="/"
        class="btn btn-secondary"
    >
        처음으로
    </a>

</div>

</body>
</html>
